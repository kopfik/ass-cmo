# Optional HTTP security headers snippet.
# Include this only if the site does not already include equivalent headers elsewhere.
#
# ASS-CMO is intended for internal/VPN/allowlisted deployments. Do not enable
# wildcard CORS by default. If cross-origin access is explicitly required,
# configure a narrow trusted origin in the site-specific config.

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Optional site-specific CORS example:
# add_header Access-Control-Allow-Origin "https://trusted.example.com" always;
# add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
# add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
