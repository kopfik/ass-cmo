user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}

http {
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=nginx_cache:128m max_size=1g inactive=60m use_temp_path=off;
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip optimization
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    types_hash_max_size 4096;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Global limits
    client_max_body_size 200m;
    client_body_timeout 180s;
    send_timeout 180s;

    # Inventory ingest endpoint rate limit.
    # The endpoint has its own small body limit in the site config.
    limit_req_zone $binary_remote_addr zone=asscmo_inventory:10m rate=30r/m;

    include /etc/nginx/sites-enabled/*;
    include /etc/nginx/conf.d/*.conf;

    limit_conn_zone $binary_remote_addr zone=addr:10m;
}

